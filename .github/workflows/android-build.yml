name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      eas_profile:
        description: 'EAS Build Profile (e.g., development, preview, production)'
        required: true
        default: 'preview'
      platform:
        description: 'Target Platform (all, android, ios)'
        required: true
        default: 'android'

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0' # Matches node setting in eas.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run typecheck

  eas-build:
    name: EAS Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    # Run on manual dispatch or push to main/master
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout repository
        if: ${{ env.EXPO_TOKEN != '' || github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ env.EXPO_TOKEN != '' || github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: Install dependencies
        if: ${{ env.EXPO_TOKEN != '' || github.event_name == 'workflow_dispatch' }}
        run: npm ci

      - name: Setup Expo / EAS CLI
        if: ${{ env.EXPO_TOKEN != '' || github.event_name == 'workflow_dispatch' }}
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Run Expo Doctor
        if: ${{ env.EXPO_TOKEN != '' || github.event_name == 'workflow_dispatch' }}
        run: npx expo-doctor

      - name: Trigger EAS Build (Build Android Apk)
        if: ${{ env.EXPO_TOKEN != '' || github.event_name == 'workflow_dispatch' }}
        run: |
          PROFILE="${{ github.event.inputs.eas_profile || 'preview' }}"
          PLATFORM="${{ github.event.inputs.platform || 'android' }}"
          eas build --platform $PLATFORM --profile $PROFILE --non-interactive
